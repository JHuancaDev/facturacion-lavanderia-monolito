<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <div th:fragment="content">
        <div class="card">
            <div class="card-header bg-primary text-white d-flex justify-content-between">
                <h4>Lista de Facturas Emitidas</h4>
                <span class="badge bg-light text-dark" th:text="${facturas.size()} + ' facturas'"></span>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-primary">
                            <tr>
                                <th>#</th>
                                <th>N° Factura</th>
                                <th>Cliente</th>
                                <th>Total</th>
                                <th>Fecha Emisión</th>
                                <th>Estado SUNAT</th>
                                <th>Pedido</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="factura, stat : ${facturas}">
                                <td th:text="${stat.index + 1}"></td>
                                <td>
                                    <strong th:text="${factura.numeroFactura}"></strong>
                                    <br>
                                    <small class="text-muted" th:text="'Serie: ' + ${factura.serie}"></small>
                                </td>
                                <td>
                                    <span th:text="${factura.clienteNombre}"></span>
                                    <br>
                                    <small class="text-muted" th:text="'RUC: ' + ${factura.clienteNumeroDoc}"></small>
                                </td>
                                <td th:text="'S/ ' + ${#numbers.formatDecimal(factura.total, 1, 2)}"></td>
                                <td th:text="${#temporals.format(factura.fechaEmision, 'dd/MM/yyyy HH:mm')}"></td>
                                <td>
                                    <span th:if="${factura.enviadoSunat}" class="badge bg-success">
                                        Enviada
                                    </span>
                                    <span th:unless="${factura.enviadoSunat}" class="badge bg-warning">
                                        Pendiente
                                    </span>
                                </td>
                                <td>
                                    <a th:href="@{/pedidos/detalle/{id}(id=${factura.pedido.id})}"
                                       class="btn btn-sm btn-info">
                                        Ver Pedido #<span th:text="${factura.pedido.id}"></span>
                                    </a>
                                </td>
                                <td>
                                    <a th:href="@{/pedidos/{id}/descargar-pdf(id=${factura.pedido.id})}"
                                       class="btn btn-sm btn-danger" title="Descargar PDF">
                                        PDF
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
