<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Restablecer Contraseña</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/bootstrap-custom.css}">
</head>
<body class="" th:style="|background-image: url('@{/image/login_fondo.svg}');|">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <img style="width: 8rem;" 
                                src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Wikimedia-logo.png/960px-Wikimedia-logo.png"
                                alt="logo">
                            <h5 class="mt-2">Nueva Contraseña</h5>
                        </div>
                        
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
                        
                        <form th:action="@{/reset-password}" method="post" id="resetForm">
                            <input type="hidden" name="token" th:value="${token}" />
                            
                            <div class="mb-3">
                                <label class="form-label">Nueva Contraseña</label>
                                <input type="password" name="password" id="password" 
                                       class="form-control" required minlength="6">
                                <div class="form-text">Mínimo 6 caracteres</div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Confirmar Contraseña</label>
                                <input type="password" name="confirmPassword" id="confirmPassword" 
                                       class="form-control" required>
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-success">Actualizar Contraseña</button>
                            </div>
                        </form>
                        
                        <div class="text-center mt-3">
                            <small>
                                <a th:href="@{/login}">← Volver al login</a>
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
    <script>
        document.getElementById('resetForm').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (password !== confirm) {
                e.preventDefault();
                alert(' Las contraseñas no coinciden');
            }
        });
    </script>
</body>
</html>
