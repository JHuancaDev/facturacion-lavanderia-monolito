<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Recuperar Contraseña</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/bootstrap-custom.css}">
</head>
<body class="" th:style="|background-image: url('@{/image/login_fondo.svg}');|">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <img style="width: 8rem;" 
                                src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Wikimedia-logo.png/960px-Wikimedia-logo.png"
                                alt="logo">
                            <h5 class="mt-2">Recuperar Contraseña</h5>
                        </div>
                        
                        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                        
                        <form th:action="@{/forgot-password}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Email registrado</label>
                                <input type="email" name="email" class="form-control" 
                                       placeholder="ejemplo@email.com" required>
                                <div class="form-text">Te enviaremos un enlace para restablecer tu contraseña.</div>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Enviar enlace</button>
                            </div>
                        </form>
                        
                        <div class="text-center mt-3">
                            <small>
                                <a th:href="@{/login}">← Volver al login</a>
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
