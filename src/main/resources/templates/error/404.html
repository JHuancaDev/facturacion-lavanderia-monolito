<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página No Encontrada</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap-custom.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-warning text-dark">
                        <h4><i class="fas fa-exclamation-triangle"></i> Error 404</h4>
                    </div>
                    <div class="card-body text-center py-5">
                        <i class="fas fa-file-search text-warning" style="font-size: 4rem;"></i>
                        <h3 class="mt-3">Página No Encontrada</h3>
                        <p class="text-muted">Lo sentimos, la página que buscas no existe o fue movida.</p>
                        <div class="mt-4">
                            <a th:href="@{/dashboard}" class="btn btn-primary">
                                <i class="fas fa-home"></i> Ir al Dashboard
                            </a>
                            <a th:href="@{/login}" class="btn btn-secondary">
                                <i class="fas fa-sign-in-alt"></i> Ir al Login
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
