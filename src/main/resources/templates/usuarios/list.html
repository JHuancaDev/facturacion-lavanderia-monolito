<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <div th:fragment="content">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4><i class="fas fa-users"></i> Gestión de Usuarios</h4>
                <a th:href="@{/usuarios/nuevo}" class="btn btn-light btn-sm float-end">
                    <i class="fas fa-plus"></i> Nuevo Usuario
                </a>
            </div>
            <div class="card-body">
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="row mb-3">
                    <div class="col-md-3">
                        <div class="card text-white bg-primary">
                            <div class="card-body">
                                <h5 class="card-title">Total Usuarios</h5>
                                <p class="card-text display-6" th:text="${totalUsers}">0</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-primary">
                            <tr>
                                <th>ID</th>
                                <th>Usuario</th>
                                <th>Nombre</th>
                                <th>Email</th>
                                <th>Rol</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.id}"></td>
                                <td th:text="${user.username}"></td>
                                <td th:text="${user.nombre}"></td>
                                <td th:text="${user.email}"></td>
                                <td>
                                    <span class="badge" th:class="${user.rol == 'ADMIN' ? 'bg-danger' : 'bg-info'}"
                                        th:text="${user.rol}">
                                    </span>
                                </td>
                                <td>
                                    <span class="badge" th:class="${user.activo ? 'bg-success' : 'bg-secondary'}"
                                        th:text="${user.activo ? 'Activo' : 'Inactivo'}">
                                    </span>
                                </td>
                                <td>
                                    <div class="btn-group" role="group">
                                        <a th:href="@{/usuarios/editar/{id}(id=${user.id})}"
                                            class="btn btn-warning btn-sm" title="Editar">
                                            <i class="fas fa-edit"></i>Editar
                                        </a>

                                        <form th:if="${user.activo}"
                                            th:action="@{/usuarios/desactivar/{id}(id=${user.id})}" method="post"
                                            style="display:inline;">
                                            <button type="submit" class="btn btn-secondary btn-sm" title="Desactivar"
                                                onclick="return confirm('¿Estás seguro de desactivar este usuario?')">
                                                <i class="fas fa-user-slash"></i>Desactivar
                                            </button>
                                        </form>

                                        <form th:if="${!user.activo}"
                                            th:action="@{/usuarios/activar/{id}(id=${user.id})}" method="post"
                                            style="display:inline;">
                                            <button type="submit" class="btn btn-success btn-sm" title="Activar"
                                                onclick="return confirm('¿Estás seguro de activar este usuario?')">
                                                <i class="fas fa-user-check"></i>Activar
                                            </button>
                                        </form>

                                        <div class="dropdown d-inline-block">
                                            <button class="btn btn-info btn-sm dropdown-toggle" type="button"
                                                data-bs-toggle="dropdown" title="Cambiar rol">
                                                <i class="fas fa-user-tag"></i>Cambiar ROL
                                            </button>
                                            <ul class="dropdown-menu">
                                                <li>
                                                    <form th:action="@{/usuarios/cambiar-rol/{id}(id=${user.id})}"
                                                        method="post">
                                                        <input type="hidden" name="rol" value="ADMIN" />
                                                        <button type="submit" class="dropdown-item">
                                                            <i class="fas fa-crown text-warning"></i> ADMIN
                                                        </button>
                                                    </form>
                                                </li>
                                                <li>
                                                    <form th:action="@{/usuarios/cambiar-rol/{id}(id=${user.id})}"
                                                        method="post">
                                                        <input type="hidden" name="rol" value="TRABAJADOR" />
                                                        <button type="submit" class="dropdown-item">
                                                            <i class="fas fa-user text-info"></i> TRABAJADOR
                                                        </button>
                                                    </form>
                                                </li>
                                            </ul>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${users.isEmpty()}">
                                <td colspan="7" class="text-center text-muted py-4">
                                    <i class="fas fa-users fa-3x d-block mb-2"></i>
                                    No hay usuarios registrados
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
