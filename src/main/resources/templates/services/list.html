<!-- templates/services/list.html (actualizado) -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h4>Gestión de Servicios</h4>
        </div>
        <div class="card-body">
            <form th:action="@{/servicios/guardar}" method="post" class="row g-3 mb-4">
                <div class="col-md-4">
                    <input type="text" name="nameService" class="form-control" placeholder="Nombre del servicio" required>
                </div>
                <div class="col-md-4">
                    <input type="number" step="0.01" name="precio" class="form-control" placeholder="Precio por kg" required>
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-primary w-100">Agregar Servicio</button>
                </div>
            </form>
            
            <table class="table table-striped table-hover">
                <thead class="table-primary">
                    <tr>
                        <th>ID</th>
                        <th>Servicio</th>
                        <th>Precio (S/ / kg)</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="serv : ${servicios}">
                        <td th:text="${serv.id}"></td>
                        <td th:text="${serv.nameService}"></td>
                        <td th:text="'S/ ' + ${serv.precio}"></td>
                        <td>
                            <a th:href="@{/servicios/eliminar/__${serv.id}__}" 
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Eliminar este servicio?')">
                                Eliminar
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
